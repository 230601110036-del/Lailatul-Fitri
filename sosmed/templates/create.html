{% extends "base.html" %}

{% block title %}
{{ page_title }}
{% endblock title %}

{% block contents %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">{{ page_title }}</h4>
      </div>

      <div class="card-body">
        <form method="POST">
          {% csrf_token %}

          <table class="table">
            {{ akun_form.as_table }}
          </table>

          <div class="d-flex justify-content-between">
            <a href="{% url 'sosmed:list' %}" class="btn btn-secondary">Kembali</a>
            <button type="submit" class="btn btn-primary">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock contents %}
