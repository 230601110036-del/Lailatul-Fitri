<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Connect</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background-image:url("{{ url_for('static', filename='bg.jpg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{

    width:600px;

    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(8px);

    padding:50px;

    border-radius:20px;

    text-align:center;

    box-shadow:
    0 0 15px #ff0000,
    0 0 30px rgba(255,0,0,0.5);
}

h2{
    color:#ff3333;
    margin-bottom:25px;
}

p{
    color:white;
    font-size:18px;
    line-height:1.8;
    margin-bottom:15px;
}

.btn{

    display:inline-block;

    margin-top:20px;

    padding:14px 30px;

    background:linear-gradient(
        to right,
        #ff0000,
        #ff4d4d
    );

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-weight:bold;

    transition:0.3s;
}

.btn:hover{
    opacity:0.9;
}

strong{
    color:#ff6666;
}

</style>
</head>

<body>

<div class="container">

    <h2>🎫 Selamat Datang di Travel Connect</h2>

    <p>
        Halo <strong>{{ nama }}</strong>,
    </p>

    <p>
        Data Anda berhasil terdaftar.
    </p>

    <p>
        Siapkan perjalanan impian Anda dan temukan
        tiket terbaik hanya dalam beberapa langkah.
    </p>

    <button class="btn" id="mulaiBtn">
        Mulai Pemesanan
    </button>

</div>

<script>

const mulaiBtn = document.querySelector('#mulaiBtn');

const nama = "{{ nama }}";

console.log(`
========================================
         HALAMAN RESPONSE
========================================

🎫 Selamat Datang di Travel Connect

Pengguna :
${nama}

Data Anda berhasil terdaftar.

Tekan tombol [Mulai Pemesanan]
untuk melanjutkan ke pencarian tiket.

========================================
`);

mulaiBtn.addEventListener('click', () => {

    console.log("Navigasi ke halaman pemesanan tiket...");

    window.location.href = '/ticket';

});

</script>

</body>
</html>
