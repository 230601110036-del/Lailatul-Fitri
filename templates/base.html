{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock title %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 214, 10, .35), transparent 25%),
        radial-gradient(circle at 90% 15%, rgba(253, 29, 29, .35), transparent 28%),
        radial-gradient(circle at 20% 90%, rgba(131, 58, 180, .45), transparent 30%),
        linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      background-attachment: fixed;
      color: #1f2937;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(24px);
      z-index: -1;
    }

    .ig-navbar {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 10px 35px rgba(0,0,0,.08);
    }

    .brand-gradient {
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      letter-spacing: -.5px;
    }

    .page-shell {
      padding-top: 42px;
      padding-bottom: 70px;
    }

    .ig-hero {
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      padding: 46px;
      color: white;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.35), transparent 25%),
        linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      box-shadow: 0 30px 80px rgba(131, 58, 180, .35);
    }

    .ig-hero::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 38px solid rgba(255,255,255,.13);
      right: -70px;
      top: -60px;
    }

    .ig-card {
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 32px;
      box-shadow: 0 28px 70px rgba(31,41,55,.18);
      overflow: hidden;
    }

    .ig-stat {
      border-radius: 28px;
      padding: 26px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 22px 55px rgba(31,41,55,.14);
      transition: .25s;
    }

    .ig-stat:hover {
      transform: translateY(-8px);
    }

    .ig-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf);
      box-shadow: 0 14px 30px rgba(214,41,118,.35);
    }

    .btn {
      border-radius: 999px;
      font-weight: 800;
      padding-left: 22px;
      padding-right: 22px;
    }

    .btn-ig {
      color: white;
      border: none;
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf);
      box-shadow: 0 14px 32px rgba(214,41,118,.38);
    }

    .btn-ig:hover {
      color: white;
      transform: translateY(-2px);
    }

    .btn-soft {
      background: rgba(255,255,255,.92);
      border: none;
      color: #d62976;
      box-shadow: 0 14px 30px rgba(255,255,255,.25);
    }

    .avatar-ring {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      border: 3px solid white;
    }

    .username-pill {
      display: inline-block;
      padding: 9px 15px;
      border-radius: 999px;
      font-weight: 900;
      color: #d62976;
      background: linear-gradient(135deg, #fff7ed, #fce7f3, #ede9fe);
    }

    .table-ig thead th {
      background: #fff1f2;
      color: #9f1239;
      border: none;
      padding: 18px;
    }

    .table-ig tbody td {
      padding: 20px 18px;
      vertical-align: middle;
    }

    .table-ig tbody tr {
      transition: .2s;
    }

    .table-ig tbody tr:hover {
      background: #fff7ed;
      transform: scale(1.006);
    }

    .form-control, input {
      border-radius: 18px !important;
      padding: 14px 18px !important;
      border: 1px solid #f9a8d4 !important;
      background: rgba(255,255,255,.9) !important;
    }

    label {
      font-weight: 900;
      color: #831843;
    }

    .custom-toast {
      min-width: 320px;
      padding: 18px 24px;
      border-radius: 24px;
      color: white;
      font-weight: 800;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
      animation: slideIn .5s ease;
    }

    .toast-success {
      background: linear-gradient(135deg, #111827, #d62976);
      border-left: 8px solid #fcb045;
    }

    .toast-error {
      background: linear-gradient(135deg, #7f1d1d, #e11d48);
      border-left: 8px solid #feda75;
    }

    .toast-content {
      font-size: 18px;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg ig-navbar">
    <div class="container">
      <a class="navbar-brand fs-3 brand-gradient" href="{% url 'sosmed:list' %}">
        ◎ SosmedGram
      </a>
      <a class="btn btn-ig" href="{% url 'sosmed:list' %}">
        Dashboard
      </a>
    </div>
  </nav>

  <div class="toast-container position-fixed top-0 end-0 p-4" style="z-index:9999;">
    {% if messages %}
      {% for message in messages %}
        <div class="custom-toast show mb-3
          {% if message.tags == 'success' %}toast-success{% elif message.tags == 'error' %}toast-error{% endif %}">
          <div class="toast-content">{{ message }}</div>
        </div>
      {% endfor %}
    {% endif %}
  </div>

  <main class="container page-shell">
    {% block contents %}
    {% endblock contents %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function confirmDelete() {
      return confirm("Yakin ingin menghapus akun ini?");
    }

    setTimeout(() => {
      const toasts = document.querySelectorAll('.custom-toast');
      toasts.forEach((toast) => {
        toast.style.transition = "all .5s ease";
        toast.style.opacity = "0";
        toast.style.transform = "translateX(120%)";
        setTimeout(() => toast.remove(), 500);
      });
    }, 2500);
  </script>
</body>
</html>
