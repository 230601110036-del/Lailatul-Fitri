{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock title %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      font-family: "Segoe UI", Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #c9dbff;
      color: #0f172a;
      transition: .3s;
    }

    body.dark-mode {
      background: #0f172a;
      color: #e2e8f0;
    }

    .app-layout {
      display: block;
      min-height: 100vh;
      padding: 24px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .45);
      backdrop-filter: blur(6px);
      z-index: 1999;
      display: none;
    }

    .sidebar-overlay.show {
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 24px;
      left: -340px;
      width: 300px;
      height: calc(100vh - 48px);
      z-index: 2000;
      transition: .35s ease;
      background: rgba(255,255,255,.96);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(30,64,175,.18);
    }

    .sidebar.show {
      left: 24px;
    }

    .dark-mode .sidebar,
    .dark-mode .dashboard-content,
    .dark-mode .stat-box,
    .dark-mode .account-card-new,
    .dark-mode .search-box,
    .dark-mode .platform-switch a,
    .dark-mode .form-wrapper {
      background: #1e293b;
      color: #e2e8f0;
    }

    .brand-box {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 35px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      display: grid;
      place-items: center;
      font-size: 24px;
    }

    .brand-box h3 {
      font-weight: 900;
      line-height: 1.1;
      margin: 0;
    }

    .brand-box span {
      color: #2563eb;
    }

    .side-menu,
    .platform-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: #0f172a;
      font-weight: 700;
      margin-bottom: 10px;
      transition: .2s;
    }

    .dark-mode .side-menu,
    .dark-mode .platform-item {
      color: #e2e8f0;
    }

    .side-menu:hover,
    .platform-item:hover,
    .side-menu.active {
      background: #eef5ff;
      color: #2563eb;
    }

    .platform-title {
      margin: 28px 0 14px;
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .setting-box {
      margin-top: 30px;
      background: #ffffff;
      padding: 20px;
      border-radius: 20px;
    }

    .dark-mode .setting-box {
      background: #334155;
    }

    .setting-box button {
      width: 100%;
      border: none;
      padding: 12px;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-weight: 800;
    }

    .dashboard-content {
      width: 100%;
      background: rgba(255,255,255,.72);
      border-radius: 30px;
      padding: 34px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.8);
    }

    .top-hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .menu-btn {
      border: none;
      background: white;
      border-radius: 14px;
      padding: 12px 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      font-size: 18px;
      cursor: pointer;
    }

    .top-hero h1 {
      font-size: 56px;
      font-weight: 900;
      margin: 24px 0 8px;
    }

    .top-hero h1 span {
      color: #2563eb;
    }

    .top-hero p {
      color: #64748b;
      font-weight: 700;
    }

    .hero-icons {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .float-icon {
      width: 82px;
      height: 82px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      font-size: 38px;
      box-shadow: 0 20px 40px rgba(37,99,235,.18);
      background: white;
    }

    .user {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #bfdbfe, #60a5fa);
      font-size: 58px;
    }

    .tiktok {
      background: #111827;
      color: white;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: white;
      border-radius: 24px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 14px 35px rgba(30,64,175,.10);
    }

    .stat-logo {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 30px;
      background: #eef5ff;
    }

    .stat-logo.dark {
      background: #111827;
      color: white;
    }

    .stat-box h2 {
      font-weight: 900;
      margin: 0;
    }

    .stat-box p {
      margin: 0;
      color: #64748b;
      font-weight: 600;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 300px 260px;
      gap: 18px;
      align-items: center;
      margin-bottom: 28px;
    }

    .platform-switch {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .platform-switch a {
      text-decoration: none;
      border: none;
      background: white;
      color: #0f172a;
      padding: 13px 22px;
      border-radius: 14px;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(0,0,0,.06);
    }

    .platform-switch a.active {
      background: #2563eb;
      color: white;
    }

    .search-box {
      background: white;
      border-radius: 16px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,.06);
    }

    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      font-weight: 600;
      background: transparent;
    }

    .add-btn {
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 15px 22px;
      border-radius: 16px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 14px 30px rgba(37,99,235,.25);
    }

    .account-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    .account-card-new {
      background: white;
      border-radius: 24px;
      padding: 24px;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 20px;
      box-shadow: 0 14px 35px rgba(30,64,175,.10);
      transition: .25s;
    }

    .account-card-new:hover {
      transform: translateY(-6px);
    }

    .profile-circle {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
    }

    .account-info h4 {
      margin: 0;
      font-weight: 900;
    }

    .account-info p {
      margin: 4px 0 0;
      color: #64748b;
      font-weight: 700;
    }

    .platform-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #eef5ff;
      color: #2563eb;
    }

    .dots {
      border: none;
      background: transparent;
      font-size: 30px;
      color: #475569;
    }

    .empty-state {
      grid-column: 1 / -1;
      background: white;
      border-radius: 24px;
      padding: 60px;
      text-align: center;
    }

    .footer-info {
      margin-top: 32px;
      color: #64748b;
      font-weight: 700;
    }

    .form-page {
      min-height: 100vh;
      padding: 50px 20px;
    }

    .form-hero {
      text-align: center;
      margin-bottom: 35px;
    }

    .form-hero h1 {
      font-size: 56px;
      font-weight: 900;
      color: #2563eb;
    }

    .form-hero p {
      color: #64748b;
      font-weight: 700;
    }

    .form-wrapper {
      max-width: 1050px;
      margin: auto;
      display: grid;
      grid-template-columns: 42% 58%;
      background: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0,0,0,.18);
    }

    .form-left {
      padding: 60px 40px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
    }

    .big-icon {
      font-size: 70px;
      margin-bottom: 20px;
    }

    .form-left h2 {
      font-weight: 900;
    }

    .form-right {
      padding: 55px;
    }

    .form-right label {
      display: block;
      font-weight: 900;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .form-right input,
    .form-right select,
    .platform-select {
      width: 100%;
      border: 1px solid #cbd5e1;
      padding: 14px 18px;
      border-radius: 16px;
      margin-bottom: 22px;
      outline: none;
      background: white;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .cancel-btn,
    .save-btn {
      border: none;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 900;
    }

    .cancel-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .custom-toast {
      min-width: 320px;
      padding: 18px 24px;
      border-radius: 24px;
      color: white;
      font-weight: 800;
      background: #111827;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
      animation: slideIn .5s ease;
    }

    .toast-error {
      background: #e11d48;
    }

    @keyframes slideIn {
      from {
        transform: translateX(120%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 992px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .account-grid,
      .stats-grid,
      .form-wrapper {
        grid-template-columns: 1fr;
      }

      .top-hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .top-hero h1 {
        font-size: 42px;
      }

      .hero-icons {
        margin-top: 20px;
      }
    }
    .search-btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 800;
    }

    @media (max-width: 600px) {
      .app-layout {
        padding: 12px;
      }

      .dashboard-content {
        padding: 22px;
        border-radius: 24px;
      }

      .top-hero {
        gap: 20px;
      }

      .top-hero h1 {
        font-size: 44px;
        line-height: 1.05;
      }

      .top-hero p {
        font-size: 18px;
        max-width: 300px;
      }

      .hero-icons {
        width: 100%;
        justify-content: center;
        gap: 14px;
      }

      .float-icon {
        width: 74px;
        height: 74px;
        border-radius: 24px;
        font-size: 34px;
      }

      .float-icon.user {
        width: 96px;
        height: 96px;
        font-size: 46px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .stat-box {
        padding: 22px;
      }

      .platform-switch {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .platform-switch a {
        text-align: center;
      }

      .toolbar {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .search-box {
        min-width: 100%;
      }

      .add-btn {
        width: 100%;
      }

      .account-grid {
        grid-template-columns: 1fr;
      }

      .account-card-new {
        grid-template-columns: 58px 1fr auto;
        padding: 18px;
        gap: 14px;
      }

      .profile-circle {
        width: 56px;
        height: 56px;
        font-size: 24px;
      }

      .account-info h4 {
        font-size: 20px;
      }

      .sidebar {
        width: 280px;
        left: -320px;
      }

      .sidebar.show {
        left: 14px;
      }
    }
  </style>
</head>

<body>

<div class="toast-container position-fixed top-0 end-0 p-4" style="z-index:9999;">
  {% if messages %}
    {% for message in messages %}
      <div class="custom-toast show mb-3
        {% if message.tags == 'error' %}toast-error{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
</div>

{% block contents %}
{% endblock contents %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');

    sidebar.classList.toggle('show');
    overlay.classList.toggle('show');
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');

    if (document.body.classList.contains('dark-mode')) {
      localStorage.setItem('theme', 'dark');
    } else {
      localStorage.setItem('theme', 'light');
    }
  }

  window.onload = function () {

    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }

    const toasts = document.querySelectorAll('.custom-toast');

    setTimeout(() => {

      toasts.forEach((toast) => {
        toast.style.transition = "all .5s ease";
        toast.style.opacity = "0";
        toast.style.transform = "translateX(120%)";

        setTimeout(() => {
          toast.remove();
        }, 500);
      });

    }, 2500);

  };

  function confirmDelete() {
    return confirm("Yakin ingin menghapus akun ini?");
  }

</script>

</body>
</html>
