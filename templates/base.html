{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock title %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    * {
      font-family: "Segoe UI", Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #102033;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.75), transparent 28%),
        radial-gradient(circle at bottom right, rgba(68,128,255,.22), transparent 30%),
        linear-gradient(135deg, #dce9ff, #c7dcff);
      transition: .3s;
    }

    body.dark-mode {
      background: linear-gradient(135deg, #07111f, #111827);
      color: #e5eefc;
    }

    .app-layout {
      min-height: 100vh;
      padding: 24px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.42);
      backdrop-filter: blur(7px);
      z-index: 1999;
      display: none;
    }

    .sidebar-overlay.show {
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 24px;
      left: -340px;
      width: 300px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      z-index: 2000;
      transition: .35s ease;
      padding: 26px;
      border-radius: 30px;
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 24px 60px rgba(35,82,160,.22);
    }

    .sidebar.show {
      left: 24px;
    }

    .brand-box {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: white;
      font-size: 23px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      box-shadow: 0 14px 32px rgba(37,99,235,.28);
    }

    .brand-box h3 {
      margin: 0;
      font-weight: 900;
      line-height: 1.1;
    }

    .brand-box span {
      color: #2563eb;
    }

    .side-menu,
    .platform-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 18px;
      text-decoration: none;
      color: #102033;
      font-weight: 800;
      margin-bottom: 10px;
      transition: .25s;
    }

    .side-menu:hover,
    .side-menu.active,
    .platform-item:hover {
      background: rgba(37,99,235,.10);
      color: #2563eb;
    }

    .platform-title {
      margin: 26px 0 12px;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .setting-box {
      margin-top: 16px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(255,255,255,.55);
    }

    .setting-box button {
      width: 100%;
      border: none;
      padding: 13px;
      border-radius: 15px;
      background: #2563eb;
      color: white;
      font-weight: 900;
    }

    .dashboard-content {
      min-height: calc(100vh - 48px);
      border-radius: 34px;
      padding: 30px;
      background: rgba(255,255,255,.58);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.70);
      box-shadow: 0 26px 70px rgba(37,99,235,.14);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .menu-btn,
    .notif-btn {
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 19px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(16px);
      color: #102033;
      font-size: 22px;
      box-shadow: 0 12px 32px rgba(15,23,42,.10);
      position: relative;
    }

    .notif-dot {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ef4444;
      border: 2px solid white;
    }

    .hero-title h1 {
      font-size: 58px;
      font-weight: 1000;
      line-height: .95;
      letter-spacing: -2.5px;
      margin: 0 0 10px;
    }

    .hero-title h1 span {
      color: #2563eb;
    }

    .hero-title p {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #64748b;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin: 28px 0;
    }

    .stat-box,
    .account-card-new,
    .search-box,
    .platform-switch a,
    .empty-state {
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 14px 36px rgba(15,23,42,.08);
    }

    .stat-box {
      border-radius: 26px;
      padding: 22px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .stat-logo {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #eef5ff;
      color: #2563eb;
      font-size: 28px;
    }

    .stat-logo.dark {
      background: #111827;
      color: white;
    }

    .stat-box h2 {
      margin: 0;
      font-weight: 1000;
    }

    .stat-box p {
      margin: 0;
      color: #64748b;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 340px 230px;
      gap: 16px;
      align-items: center;
      margin-bottom: 26px;
    }

    .platform-switch {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .platform-switch a {
      text-decoration: none;
      color: #102033;
      padding: 14px 20px;
      border-radius: 17px;
      font-weight: 900;
    }

    .platform-switch a.active {
      background: #2563eb;
      color: white;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #102033;
      font-weight: 700;
    }

    .search-box input::placeholder {
      color: #64748b;
      opacity: 1;
    }

    .search-btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 8px 15px;
      border-radius: 12px;
      font-weight: 900;
    }

    .add-btn {
      text-decoration: none;
      text-align: center;
      border-radius: 18px;
      padding: 16px 20px;
      background: #2563eb;
      color: white;
      font-weight: 900;
      box-shadow: 0 16px 34px rgba(37,99,235,.28);
    }

    .account-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .account-card-new {
      border-radius: 24px;
      padding: 22px;
      display: grid;
      grid-template-columns: 68px 1fr auto;
      align-items: center;
      gap: 18px;
      transition: .25s;
    }

    .account-card-new:hover {
      transform: translateY(-5px);
    }

    .profile-circle {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      font-size: 26px;
      font-weight: 1000;
      box-shadow: 0 16px 32px rgba(37,99,235,.25);
    }

    .account-info h4 {
      margin: 0;
      font-weight: 1000;
    }

    .account-info p {
      margin: 3px 0 0;
      color: #64748b;
      font-weight: 800;
    }

    .platform-badge {
      display: inline-block;
      margin-top: 7px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef5ff;
      color: #2563eb;
      font-size: 12px;
      font-weight: 900;
    }

    .dots {
      border: none;
      background: transparent;
      font-size: 28px;
      color: #475569;
    }

    .empty-state {
      grid-column: 1 / -1;
      border-radius: 24px;
      padding: 50px;
      text-align: center;
    }

    .footer-info {
      margin-top: 26px;
      color: #64748b;
      font-weight: 800;
    }

    .form-page {
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .form-wrapper {
      width: min(560px, 100%);
      border-radius: 32px;
      padding: 32px;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 24px 64px rgba(37,99,235,.18);
    }

    .form-hero {
      text-align: center;
      margin-bottom: 26px;
    }

    .form-hero h1 {
      font-size: 42px;
      font-weight: 1000;
      color: #2563eb;
      margin-bottom: 8px;
    }

    .form-hero p {
      color: #64748b;
      font-weight: 700;
    }

    .form-right label {
      display: block;
      font-weight: 900;
      margin-bottom: 8px;
      color: #102033;
    }

    .form-right input,
    .form-right select,
    .platform-select {
      width: 100%;
      border: 1px solid #cbd5e1;
      padding: 14px 18px;
      border-radius: 16px;
      margin-bottom: 18px;
      outline: none;
      background: rgba(255,255,255,.88);
      color: #102033;
      font-weight: 700;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
    }

    .cancel-btn,
    .save-btn {
      border: none;
      text-decoration: none;
      padding: 14px 26px;
      border-radius: 16px;
      font-weight: 900;
    }

    .cancel-btn {
      background: #e2e8f0;
      color: #102033;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .custom-toast {
      min-width: 320px;
      padding: 18px 24px;
      border-radius: 22px;
      color: white;
      font-weight: 900;
      background: #111827;
      box-shadow: 0 18px 44px rgba(0,0,0,.25);
      animation: slideIn .5s ease;
    }

    .toast-error {
      background: #e11d48;
    }

    .notification-menu {
      width: 310px;
      border: none;
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 20px 50px rgba(15,23,42,.18);
    }

    .notification-item {
      padding: 13px;
      border-radius: 16px;
      font-weight: 800;
      background: #f8fbff;
      margin-bottom: 8px;
    }

    .notification-empty {
      padding: 15px;
      color: #64748b;
      font-weight: 800;
    }

    body.dark-mode .sidebar,
    body.dark-mode .dashboard-content,
    body.dark-mode .stat-box,
    body.dark-mode .account-card-new,
    body.dark-mode .search-box,
    body.dark-mode .platform-switch a,
    body.dark-mode .empty-state,
    body.dark-mode .form-wrapper,
    body.dark-mode .setting-box {
      background: rgba(30,41,59,.86);
      color: #e5eefc;
      border-color: rgba(255,255,255,.10);
    }

    body.dark-mode .hero-title p,
    body.dark-mode .stat-box p,
    body.dark-mode .account-info p,
    body.dark-mode .footer-info,
    body.dark-mode .form-hero p {
      color: #cbd5e1;
    }

    body.dark-mode .search-box input,
    body.dark-mode .form-right input,
    body.dark-mode .form-right select {
      color: #e5eefc;
      background: rgba(15,23,42,.55);
    }

    body.dark-mode .search-box input::placeholder {
      color: #cbd5e1;
    }

    body.dark-mode .side-menu,
    body.dark-mode .platform-item,
    body.dark-mode .form-right label {
      color: #e5eefc;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 992px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .account-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .app-layout {
        padding: 14px;
      }

      .dashboard-content {
        padding: 20px;
        border-radius: 28px;
      }

      .top-bar {
        align-items: flex-start;
      }

      .top-actions {
        gap: 10px;
      }

      .menu-btn,
      .notif-btn {
        width: 52px;
        height: 52px;
        border-radius: 17px;
        font-size: 20px;
      }

      .hero-title h1 {
        font-size: 48px;
      }

      .hero-title p {
        font-size: 15px;
        max-width: 230px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: stretch;
      }

      .stat-box {
        height: 120px;
        padding: 16px;
        border-radius: 28px;

        display: grid;
        grid-template-columns: 48px 1fr;
        align-items: center;
        gap: 12px;
      }

      .stat-logo {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        font-size: 22px;
      }

      .stat-box h2 {
        font-size: 28px;
        line-height: 1;
        margin: 0 0 6px;
      }

      .stat-box p {
        font-size: 13px;
        line-height: 1.25;
        margin: 0;
      }

      .platform-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .platform-switch a {
        text-align: center;
        padding: 14px 8px;
      }

      .search-box {
        width: 100%;
      }

      .search-btn {
        display: none;
      }

      .add-btn {
        width: 100%;
      }

      .account-grid {
        grid-template-columns: 1fr;
      }

      .account-card-new {
        grid-template-columns: 62px 1fr auto;
        padding: 18px;
        gap: 14px;
      }

      .profile-circle {
        width: 58px;
        height: 58px;
        font-size: 23px;
      }

      .account-info h4 {
        font-size: 19px;
      }

      .platform-badge {
        display: none;
      }

      .sidebar {
        top: 14px;
        width: 290px;
        left: -330px;
        max-height: calc(100vh - 28px);
      }

      .sidebar.show {
        left: 14px;
      }

      .notification-menu {
        width: 280px;
      }

      .form-page {
        padding: 16px;
      }

      .form-wrapper {
        padding: 24px;
      }

      .stat-box {
        display: grid;
        grid-template-columns: 48px 1fr;
        align-items: center;
        min-height: 120px;
      }

      .stat-box h2 {
        font-size: 28px;
        line-height: 1;
        margin-bottom: 6px;
      }

      .stat-box p {
        font-size: 14px;
        line-height: 1.25;
        max-width: 90px;
      }

      .stat-logo {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

<div class="toast-container position-fixed top-0 end-0 p-4" style="z-index:9999;">
  {% if messages %}
    {% for message in messages %}
      <div class="custom-toast show mb-3 {% if message.tags == 'error' %}toast-error{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
</div>

{% block contents %}
{% endblock contents %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');

    if (sidebar && overlay) {
      sidebar.classList.toggle('show');
      overlay.classList.toggle('show');
    }
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');

    if (document.body.classList.contains('dark-mode')) {
      localStorage.setItem('theme', 'dark');
    } else {
      localStorage.setItem('theme', 'light');
    }
  }

  window.onload = function () {
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }

    const toasts = document.querySelectorAll('.custom-toast');

    setTimeout(() => {
      toasts.forEach((toast) => {
        toast.style.transition = "all .5s ease";
        toast.style.opacity = "0";
        toast.style.transform = "translateX(120%)";

        setTimeout(() => {
          toast.remove();
        }, 500);
      });
    }, 2500);
  };

  function confirmDelete() {
    return confirm("Yakin ingin menghapus akun ini?");
  }
</script>

</body>
</html>
