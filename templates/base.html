{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock title %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, .35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, .35), transparent 30%),
        linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #f8fafc;
    }

    .glass-navbar {
      background: rgba(15, 23, 42, .75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .navbar-brand {
      letter-spacing: .5px;
    }

    .page-shell {
      padding-top: 40px;
      padding-bottom: 60px;
    }

    .hero-card {
      background:
        linear-gradient(135deg, rgba(37, 99, 235, .95), rgba(124, 58, 237, .95));
      border-radius: 32px;
      padding: 42px;
      box-shadow: 0 25px 60px rgba(0,0,0,.35);
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      top: -80px;
      right: -60px;
    }

    .glass-card {
      background: rgba(255,255,255,.92);
      color: #0f172a;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .stat-card {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 24px;
      padding: 24px;
      color: white;
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 40px rgba(0,0,0,.22);
    }

    .btn {
      border-radius: 999px;
      font-weight: 700;
      padding-left: 20px;
      padding-right: 20px;
    }

    .btn-glow {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      border: none;
      color: white;
      box-shadow: 0 12px 25px rgba(249, 115, 22, .35);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      box-shadow: 0 12px 25px rgba(37, 99, 235, .25);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #e11d48);
      border: none;
    }

    .table-modern thead th {
      background: linear-gradient(135deg, #1e40af, #4338ca);
      color: white;
      padding: 18px;
      border: none;
    }

    .table-modern tbody td {
      padding: 20px 18px;
      vertical-align: middle;
    }

    .table-modern tbody tr:hover {
      background: #eef2ff;
      transform: scale(1.005);
      transition: .2s;
    }

    .badge-username {
      display: inline-block;
      background: linear-gradient(135deg, #dbeafe, #ede9fe);
      color: #3730a3;
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 800;
    }

    .form-control, input {
      border-radius: 16px !important;
      padding: 12px 16px !important;
      border: 1px solid #cbd5e1 !important;
    }

    label {
      font-weight: 800;
    }

    .custom-toast {
  min-width: 320px;
  padding: 18px 24px;
  border-radius: 24px;
  color: white;
  font-weight: 700;
  backdrop-filter: blur(14px);
  box-shadow: 0 20px 40px rgba(0,0,0,.35);

  animation: slideIn .5s ease;
}

.toast-success {
  background: rgba(15, 23, 42, .92);
  border-left: 8px solid #22d3ee;
}

.toast-error {
  background: rgba(127, 29, 29, .92);
  border-left: 8px solid #fb7185;
}

.toast-content {
  font-size: 18px;
}

@keyframes slideIn {
  from {
    transform: translateX(120%);
    opacity: 0;
  }

  to {
    transform: translateX(0);
    opacity: 1;
  }
}
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark glass-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="{% url 'sosmed:list' %}">
        ✨ Sosmed Manager
      </a>
      <a class="btn btn-light" href="{% url 'sosmed:list' %}">
        Dashboard
      </a>
    </div>
  </nav>

  <div class="toast-container position-fixed top-0 end-0 p-4"
     style="z-index:9999;">

  {% if messages %}
    {% for message in messages %}

      <div class="custom-toast show mb-3
        {% if message.tags == 'success' %}
          toast-success
        {% elif message.tags == 'error' %}
          toast-error
        {% endif %}
      ">

        <div class="toast-content">
          {{ message }}
        </div>

      </div>

    {% endfor %}
  {% endif %}

</div>
  <main class="container page-shell">
    {% block contents %}
    {% endblock contents %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function confirmDelete() {
      return confirm("Yakin ingin menghapus akun ini?");
    }
  </script>
</body>
</html>
