<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAVEL CONNECT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image:url("/static/bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:700px;

    background:rgba(70,70,70,0.9);

    border-radius:35px;

    padding:120px 60px 60px;

    position:relative;

    box-shadow:
    0 0 20px rgba(255,0,0,.7),
    0 0 40px rgba(255,0,0,.5);
}

.airplane{
    width:280px;

    position:absolute;

    top:-100px;
    left:50%;

    transform:translateX(-50%);

    z-index:10;
}

h1{
    text-align:center;
    color:#ff3333;
    font-size:55px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:white;
    font-size:24px;
    margin-bottom:40px;
}

label{
    display:block;
    color:white;
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:15px;

    border:none;
    border-radius:15px;

    font-size:18px;
}

button{
    width:100%;

    margin-top:40px;

    padding:15px;

    border:none;
    border-radius:50px;

    background:linear-gradient(
        to right,
        #ff0000,
        #ff4d4d
    );

    color:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

    <img src="/static/airplane.png" alt="Airplane" class="airplane">

    <h1>TRAVEL CONNECT</h1>

    <p class="subtitle">
        Booking Ticket System
    </p>

    <form action="/" method="post">

        <label>Nama Depan</label>
        <input
            type="text"
            name="namaDepan"
            placeholder="Masukkan Nama Depan"
            required>

        <label>Nama Belakang</label>
        <input
            type="text"
            name="namaBelakang"
            placeholder="Masukkan Nama Belakang"
            required>

        <button type="submit">
            Kirim
        </button>

    </form>

</div>

</body>
</html>
